services:
  - type: web
    name: ai-interview-platform
    runtime: docker
    repo: https://github.com/Yugdipgadpayle/ai-interview-platform.git
    branch: main
    plan: free
    healthCheckPath: /health
    # preDeployCommand: alembic upgrade head
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-interview-cache
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: mock
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash

  - type: keyvalue
    name: ai-interview-cache
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: ai-interview-db
    plan: free
    databaseName: interview_platform
    user: interview_user
